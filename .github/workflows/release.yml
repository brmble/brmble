name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

jobs:
  client:
    name: Build Client
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Build frontend
        working-directory: src/Brmble.Web
        run: |
          npm ci
          npm run build

      - name: Publish client
        run: dotnet publish src/Brmble.Client/Brmble.Client.csproj -c Release -r win-x64 --self-contained -o publish

      - name: Copy web dist to publish
        shell: bash
        run: |
          mkdir -p publish/web
          cp -r src/Brmble.Web/dist/* publish/web/

      - name: Install Velopack CLI
        run: dotnet tool install -g vpk

      - name: Download previous release (for delta packages)
        run: vpk download github --repoUrl https://github.com/${{ github.repository }} --token ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Pack with Velopack
        run: >
          vpk pack
          --packId Brmble
          --packVersion ${{ steps.version.outputs.version }}
          --packDir publish
          --mainExe Brmble.Client.exe
          --packTitle "Brmble"
          --icon src/Brmble.Client/Resources/brmble.ico

      - name: Create portable zip
        shell: bash
        run: |
          cd publish
          7z a -tzip ../Brmble-portable.zip .

      - name: Upload to GitHub Release
        run: >
          vpk upload github
          --repoUrl https://github.com/${{ github.repository }}
          --tag ${{ github.ref_name }}
          --token ${{ secrets.GITHUB_TOKEN }}
          --releaseName "Brmble ${{ steps.version.outputs.version }}"
          --publish
          --merge

      - name: Upload portable zip to release
        uses: softprops/action-gh-release@v2
        with:
          files: Brmble-portable.zip
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true

  server:
    name: Build Server Docker
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/brmble/brmble-server
          tags: |
            type=raw,value=latest
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: src/Brmble.Server/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
