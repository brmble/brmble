# LiveKit server config — templated by entrypoint.sh
# API keys are injected via LIVEKIT_KEYS env var: "api-key: secret"
# node_ip is replaced by entrypoint.sh (default: 127.0.0.1, override via LIVEKIT_NODE_IP)
port: 7880
bind_addresses:
  - "0.0.0.0"

rtc:
  tcp_port: 7881
  port_range_start: 50000
  port_range_end: 50100
  __LIVEKIT_RTC_IP__

logging:
  json: false
  level: info
