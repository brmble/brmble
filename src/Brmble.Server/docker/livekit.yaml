# LiveKit server config — templated by entrypoint.sh
# API keys are injected via LIVEKIT_KEYS env var: "api-key: secret"
# node_ip is set from LIVEKIT_NODE_IP when provided; otherwise use_external_ip/STUN-based detection is used
port: 7880
bind_addresses:
  - "0.0.0.0"

rtc:
  tcp_port: 7881
  port_range_start: 50000
  port_range_end: 50100
  __LIVEKIT_RTC_IP__

logging:
  json: false
  level: info
